<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>tilt-ninja — controller (Stage 2b)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #111;
    color: #eee;
    font-family: ui-monospace, monospace;
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
  }

  #startOverlay {
    position: fixed; inset: 0;
    background: #111;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    z-index: 20;
  }
  #startBtn {
    font: inherit;
    font-size: 22px;
    padding: 28px 48px;
    background: #222;
    color: #fff;
    border: 2px solid #666;
    cursor: pointer;
  }
  #startBtn:active { background: #333; }
  #startHint { color: #999; font-size: 12px; max-width: 80%; text-align: center; line-height: 1.5; }

  #warn {
    position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
    background: #300; color: #fbb;
    border: 1px solid #a44;
    padding: 14px 18px;
    font-size: 13px;
    max-width: 85%;
    z-index: 30;
    display: none;
    line-height: 1.5;
  }

  #debug {
    position: fixed; top: 8px; left: 8px;
    font-size: 12px;
    line-height: 1.6;
    color: #9c9;
    background: rgba(0,0,0,0.55);
    padding: 6px 8px;
    z-index: 10;
    pointer-events: none;
    white-space: pre;
  }

  #controls {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.65);
    padding: 10px 14px 14px;
    z-index: 10;
    display: none;
  }
  #controls.on { display: block; }
  .row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .row label { width: 52px; font-size: 12px; color: #ccc; flex: none; }
  .row input[type=text] {
    flex: 1; min-width: 0;
    font: inherit; font-size: 13px;
    padding: 6px 8px;
    background: #000; color: #fff;
    border: 1px solid #666;
  }
  #connectBtn {
    font: inherit; font-size: 13px;
    padding: 6px 14px;
    background: #222; color: #fff;
    border: 1px solid #666;
    cursor: pointer;
    flex: none;
  }
  #connectBtn:active { background: #333; }

  /* zona tap lebar — dipencet tanpa liat layar */
  #captureBtn {
    font: inherit; font-size: 28px;
    width: 100%;
    padding: 56px 0;
    margin-top: 12px;
    background: #222; color: #fff;
    border: 2px solid #666;
    cursor: pointer;
  }
  #captureBtn:active { background: #444; }
</style>
</head>
<body>

<div id="debug">waiting…</div>

<div id="controls">
  <div class="row" style="margin-top:0">
    <label for="relayUrl">relay</label>
    <input id="relayUrl" type="text" value="https://tilt-ninja-relay.well65632.workers.dev">
  </div>
  <div class="row">
    <label for="roomCode">room</label>
    <input id="roomCode" type="text" value="1234">
    <button id="connectBtn">CONNECT</button>
  </div>
  <button id="captureBtn">CAPTURE</button>
</div>

<div id="warn">No orientation data — pastikan HTTPS/secure context (Android Chrome butuh HTTPS buat DeviceOrientation).</div>

<div id="startOverlay">
  <button id="startBtn">TAP TO START</button>
  <div id="startHint">Controller = sensor murni. Pointer, kalibrasi, dan mapping semua di layar besar.
Tap untuk mulai kirim orientasi.</div>
</div>

<script>
(function () {
  'use strict';

  var debugEl = document.getElementById('debug');
  var warnEl = document.getElementById('warn');
  var overlay = document.getElementById('startOverlay');
  var controls = document.getElementById('controls');

  // --- quaternion dari Euler W3C Z-X'-Y'' intrinsic: x=beta, y=gamma, z=alpha ---
  var D2R = Math.PI / 180;
  function eulerToQuat(alphaDeg, betaDeg, gammaDeg) {
    var x = betaDeg * D2R / 2, y = gammaDeg * D2R / 2, z = alphaDeg * D2R / 2;
    var cX = Math.cos(x), cY = Math.cos(y), cZ = Math.cos(z);
    var sX = Math.sin(x), sY = Math.sin(y), sZ = Math.sin(z);
    return {
      w: cX * cY * cZ - sX * sY * sZ,
      x: sX * cY * cZ - cX * sY * sZ,
      y: cX * sY * cZ + sX * cY * sZ,
      z: cX * cY * sZ + sX * sY * cZ
    };
  }

  // --- orientation state ---
  var started = false;
  var rawAlpha = 0, rawBeta = 0, rawGamma = 0;
  var haveData = false;
  var evName = 'deviceorientation';

  // ring buffer quaternion ~300ms terakhir (anti-jostle buat CAPTURE)
  var ringBuf = [];
  var RING_MS = 400, CAPTURE_WINDOW_MS = 300;

  // Hz counter
  var evCount = 0, hz = 0, hzT0 = 0;

  function onOrientation(e) {
    if (e.beta === null || e.gamma === null) return;
    rawAlpha = e.alpha === null ? 0 : e.alpha;
    rawBeta = e.beta;
    rawGamma = e.gamma;
    haveData = true;

    var now = performance.now();
    ringBuf.push({ ts: now, q: eulerToQuat(rawAlpha, rawBeta, rawGamma) });
    while (ringBuf.length && now - ringBuf[0].ts > RING_MS) ringBuf.shift();

    evCount++;
    if (hzT0 === 0) hzT0 = now;
    if (now - hzT0 >= 1000) {
      hz = Math.round(evCount * 1000 / (now - hzT0));
      evCount = 0;
      hzT0 = now;
    }
  }

  // rata-rata quaternion: align hemisphere ke sampel pertama, rata-rata komponen,
  // normalisasi. Valid karena sudut antar sampel berdekatan (~300ms diam).
  function averageQuat(samples) {
    var ref = samples[0].q;
    var sw = 0, sx = 0, sy = 0, sz = 0, i, q, s;
    for (i = 0; i < samples.length; i++) {
      q = samples[i].q;
      s = (q.w * ref.w + q.x * ref.x + q.y * ref.y + q.z * ref.z) < 0 ? -1 : 1;
      sw += s * q.w; sx += s * q.x; sy += s * q.y; sz += s * q.z;
    }
    var n = Math.sqrt(sw * sw + sx * sx + sy * sy + sz * sz);
    if (n < 1e-9) return null;
    return [sw / n, sx / n, sy / n, sz / n];
  }

  // --- net: controller = sensor bodoh, cuma stream quaternion mentah ---
  var ws = null, wsState = 'idle', wantConnect = false;
  var seq = 0, lastSend = 0;
  var SEND_MIN_MS = 1000 / 60;
  var rtt = -1, rttAvg = -1, rttPeak = 0;
  var reconnectTimer = 0;

  function wsUrl() {
    var base = document.getElementById('relayUrl').value.trim().replace(/\/+$/, '');
    base = base.replace(/^http/, 'ws'); // https -> wss
    var room = document.getElementById('roomCode').value.trim() || '1234';
    return base + '/ws?room=' + encodeURIComponent(room) + '&role=controller';
  }

  function scheduleReconnect() {
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 1000);
  }

  function connect() {
    wantConnect = true;
    if (ws) {
      ws.onclose = null;
      try { ws.close(); } catch (e) {}
      ws = null;
    }
    wsState = 'connecting';
    try {
      ws = new WebSocket(wsUrl());
    } catch (e) {
      wsState = 'error';
      scheduleReconnect();
      return;
    }
    ws.onopen = function () { wsState = 'open'; };
    ws.onclose = function () {
      wsState = 'closed';
      ws = null;
      if (wantConnect) scheduleReconnect();
    };
    ws.onmessage = function (ev) {
      var m;
      try { m = JSON.parse(ev.data); } catch (e) { return; }
      if (m && m.ack !== undefined && typeof m.ts === 'number') {
        rtt = performance.now() - m.ts;
        rttAvg = rttAvg < 0 ? rtt : rttAvg + 0.1 * (rtt - rttAvg);
        if (rtt > rttPeak) rttPeak = rtt;
      }
    };
  }
  document.getElementById('connectBtn').addEventListener('click', connect);

  // CAPTURE: pointerdown (bukan click) = timing paling awal, sebelum goyangan tap
  // merambat. Kirim rata-rata buffer SEBELUM tap, bukan quaternion saat tap.
  var lastCapInfo = '';
  document.getElementById('captureBtn').addEventListener('pointerdown', function (e) {
    e.preventDefault();
    var tap = performance.now();
    var samples = [];
    for (var i = 0; i < ringBuf.length; i++) {
      if (tap - ringBuf[i].ts <= CAPTURE_WINDOW_MS) samples.push(ringBuf[i]);
    }
    if (!samples.length) { lastCapInfo = 'cap: no data'; return; }
    var qa = averageQuat(samples);
    if (!qa) { lastCapInfo = 'cap: avg fail'; return; }
    if (ws && wsState === 'open') {
      try {
        ws.send(JSON.stringify({ btn: 'capture', q: qa }));
        lastCapInfo = 'cap sent (' + samples.length + ' smp)';
      } catch (err) { lastCapInfo = 'cap: send fail'; }
    } else {
      lastCapInfo = 'cap: not connected';
    }
  });

  document.getElementById('startBtn').addEventListener('click', function () {
    started = true;
    overlay.style.display = 'none';
    controls.classList.add('on');
    evName = ('ondeviceorientationabsolute' in window) ? 'deviceorientationabsolute' : 'deviceorientation';
    window.addEventListener(evName, onOrientation);
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(function () {});
    }
    setTimeout(function () {
      if (!haveData) warnEl.style.display = 'block';
    }, 2000);
  });

  // --- loop kirim: rAF throttle 60/s. Nol render. Debug DOM maks 5x/detik. ---
  var lastDebug = 0;
  function loop() {
    requestAnimationFrame(loop);
    if (!started) return;
    var now = performance.now();

    if (ws && wsState === 'open' && haveData && now - lastSend >= SEND_MIN_MS) {
      lastSend = now;
      seq++;
      var q = eulerToQuat(rawAlpha, rawBeta, rawGamma);
      try {
        ws.send(JSON.stringify({ t: seq, q: [q.w, q.x, q.y, q.z], ts: now }));
      } catch (e) {}
    }

    if (now - lastDebug >= 200) {
      lastDebug = now;
      if (haveData) warnEl.style.display = 'none';
      debugEl.textContent =
        'src   ' + evName + (haveData ? '' : '  (no data)') + '\n' +
        'rate  ' + hz + ' Hz\n' +
        'net   ' + wsState + (rtt < 0 ? '' :
          '  rtt ' + rtt.toFixed(0) + 'ms  avg ' + rttAvg.toFixed(0) + '  peak ' + rttPeak.toFixed(0)) + '\n' +
        (lastCapInfo ? lastCapInfo : '');
    }
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
