<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tilt-ninja — display (Stage 3a)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #111;
    color: #eee;
    font-family: ui-monospace, monospace;
    -webkit-user-select: none; user-select: none;
  }
  #stage { position: fixed; inset: 0; display: block; }

  #banner {
    position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
    background: #320; color: #fc8;
    border: 1px solid #a70;
    padding: 6px 12px;
    font-size: 12px;
    z-index: 15;
    pointer-events: none;
    white-space: nowrap;
    display: none;
  }

  #debug {
    position: fixed; top: 8px; left: 8px;
    font-size: 12px;
    line-height: 1.6;
    color: #9c9;
    background: rgba(0,0,0,0.55);
    padding: 6px 8px;
    z-index: 10;
    pointer-events: none;
    white-space: pre;
  }

  #overlay {
    position: fixed; inset: 0;
    background: #111;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    z-index: 20;
  }
  #overlay .box { display: flex; gap: 10px; align-items: center; }
  #overlay label { font-size: 14px; color: #ccc; }
  #overlay input {
    font: inherit; font-size: 18px;
    padding: 10px 12px;
    background: #000; color: #fff;
    border: 1px solid #666;
    width: 420px; max-width: 70vw;
  }
  #overlay #room { width: 120px; }
  #connectBtn {
    font: inherit; font-size: 18px;
    padding: 10px 24px;
    background: #222; color: #fff;
    border: 2px solid #666;
    cursor: pointer;
  }
  #connectBtn:active { background: #333; }
  #overlay .hint { color: #999; font-size: 12px; }

  #controls {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.65);
    padding: 10px 14px 14px;
    z-index: 10;
    display: none;
  }
  #controls.on { display: block; }
  .row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .row label { width: 92px; font-size: 12px; color: #ccc; flex: none; }
  .row input[type=range] { flex: 1; height: 22px; }
  .row label.cb { width: auto; display: flex; align-items: center; gap: 6px; margin-right: 18px; }
  .row .val { width: 46px; text-align: right; font-size: 12px; color: #9c9; flex: none; }
  .btnrow { display: flex; gap: 10px; }
  .btnrow button {
    font: inherit; font-size: 14px;
    padding: 8px 0;
    flex: 1;
    background: #222; color: #fff;
    border: 1px solid #666;
    cursor: pointer;
  }
  .btnrow button:active { background: #333; }
  #redoCorner { display: none; }
  button.preset {
    font: inherit; font-size: 12px;
    padding: 4px 12px;
    background: #222; color: #fff;
    border: 1px solid #666;
    cursor: pointer;
    flex: none;
  }
  button.preset:active { background: #333; }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div id="banner">MAPPING PLACEHOLDER — belum terkalibrasi. Jalankan CALIBRATE untuk mapping homography.</div>

<div id="debug">waiting…</div>

<div id="controls">
  <div class="btnrow">
    <button id="calibrate">CALIBRATE</button>
    <button id="redoCorner">REDO LAST CORNER</button>
    <button id="clearCalib">CLEAR CALIBRATION</button>
    <button id="recenter">RECENTER (R) — placeholder</button>
    <button id="resetPeak">RESET PEAK</button>
  </div>
  <div class="row">
    <label>mapping</label>
    <label class="cb"><input type="radio" name="mapmode" id="mapPlaceholder" checked> placeholder</label>
    <label class="cb"><input type="radio" name="mapmode" id="mapCalibrated"> calibrated</label>
    <label class="cb"><input type="radio" name="mapmode" id="mapRelative"> relative</label>
    <label class="cb" id="verifyLbl"><input id="verify" type="checkbox"> verify tepi</label>
    <label class="cb"><input id="game" type="checkbox"> GAME</label>
  </div>
  <div class="row">
    <label>relative</label>
    <label class="cb"><input id="autoGain" type="checkbox" checked> AUTO GAIN</label>
    <button class="preset" id="sw35">35</button>
    <button class="preset" id="sw45">45</button>
    <button class="preset" id="sw60">60</button>
  </div>
  <div class="row">
    <label for="sweep">sweep (°)</label>
    <input id="sweep" type="range" min="20" max="120" step="1" value="35">
    <span class="val" id="sweepVal">35</span>
  </div>
  <div class="row">
    <label for="relGain">rel gain px/°</label>
    <input id="relGain" type="range" min="1" max="40" step="0.5" value="12">
    <span class="val" id="relGainVal">12.0</span>
  </div>
  <div class="row">
    <label for="dead">deadzone °/s</label>
    <input id="dead" type="range" min="0" max="5" step="0.1" value="0.3">
    <span class="val" id="deadVal">0.3</span>
  </div>
  <div class="row">
    <label for="pull">center pull /s</label>
    <input id="pull" type="range" min="0" max="3" step="0.1" value="0">
    <span class="val" id="pullVal">0.0</span>
  </div>
  <div class="row">
    <label for="thr">slice thr px/s</label>
    <input id="thr" type="range" min="100" max="4000" step="50" value="1200">
    <span class="val" id="thrVal">1200</span>
  </div>
  <div class="row">
    <label for="spawn">spawn /s</label>
    <input id="spawn" type="range" min="0.1" max="3" step="0.1" value="0.8">
    <span class="val" id="spawnVal">0.8</span>
  </div>
  <div class="row">
    <label for="grav">gravity px/s²</label>
    <input id="grav" type="range" min="200" max="3000" step="50" value="1200">
    <span class="val" id="gravVal">1200</span>
  </div>
  <div class="row">
    <label for="frad">radius px</label>
    <input id="frad" type="range" min="15" max="90" step="5" value="45">
    <span class="val" id="fradVal">45</span>
  </div>
  <div class="row">
    <label for="sensX">sensX (px/°)</label>
    <input id="sensX" type="range" min="1" max="30" step="0.5" value="12">
    <span class="val" id="sensXVal">12.0</span>
  </div>
  <div class="row">
    <label for="sensY">sensY (px/°)</label>
    <input id="sensY" type="range" min="1" max="30" step="0.5" value="12">
    <span class="val" id="sensYVal">12.0</span>
  </div>
  <div class="row">
    <label for="alpha">smooth α</label>
    <input id="alpha" type="range" min="0.05" max="1" step="0.05" value="0.3">
    <span class="val" id="alphaVal">0.30</span>
  </div>
  <div class="row">
    <label>invert (plc)</label>
    <label class="cb"><input id="invX" type="checkbox"> X</label>
    <label class="cb"><input id="invY" type="checkbox"> Y</label>
  </div>
</div>

<div id="overlay">
  <div class="box">
    <label for="relayUrl">relay</label>
    <input id="relayUrl" type="text" value="https://tilt-ninja-relay.well65632.workers.dev">
  </div>
  <div class="box">
    <label for="room">room</label>
    <input id="room" type="text" value="1234">
    <button id="connectBtn">CONNECT</button>
  </div>
  <div class="hint">Buka controller di HP, samakan room code, lalu CONNECT dua-duanya. R = recenter (relative: ke tengah; placeholder: reset basis).</div>
</div>

<script>
(function () {
  'use strict';

  var canvas = document.getElementById('stage');
  var ctx = canvas.getContext('2d');
  var debugEl = document.getElementById('debug');
  var bannerEl = document.getElementById('banner');
  var overlay = document.getElementById('overlay');
  var controls = document.getElementById('controls');

  var W = 0, H = 0, dpr = 1;
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (autoGainEl) updateGainUI();   // auto gain = W/sweep -> tampilan ikut resize
  }
  window.addEventListener('resize', resize);
  resize();

  // --- tuning ---
  var sensX = 12, sensY = 12, alpha = 0.3;
  var sliceThr = 1200, spawnRate = 0.8, grav = 1200, fruitR = 45;
  var sweepDeg = 35, relGain = 12, relDeadzone = 0.3, centerPull = 0;

  // restore preferensi relative + mode SEBELUM slider di-bind (bind baca value elemen)
  var REL_KEY = 'tiltNinjaRel';
  var relSaved = null;
  try { relSaved = JSON.parse(localStorage.getItem(REL_KEY)); } catch (e) {}
  if (relSaved) {
    if (typeof relSaved.sweep === 'number') document.getElementById('sweep').value = relSaved.sweep;
    if (typeof relSaved.relGain === 'number') document.getElementById('relGain').value = relSaved.relGain;
    if (typeof relSaved.dead === 'number') document.getElementById('dead').value = relSaved.dead;
    if (typeof relSaved.pull === 'number') document.getElementById('pull').value = relSaved.pull;
    if (typeof relSaved.autoGain === 'boolean') document.getElementById('autoGain').checked = relSaved.autoGain;
  }
  function bindSlider(id, valId, fmt, set) {
    var el = document.getElementById(id);
    var valEl = document.getElementById(valId);
    function apply() {
      var v = parseFloat(el.value);
      set(v);
      valEl.textContent = fmt(v);
    }
    el.addEventListener('input', apply);
    apply();
  }
  bindSlider('sensX', 'sensXVal', function (v) { return v.toFixed(1); }, function (v) { sensX = v; });
  bindSlider('sensY', 'sensYVal', function (v) { return v.toFixed(1); }, function (v) { sensY = v; });
  bindSlider('alpha', 'alphaVal', function (v) { return v.toFixed(2); }, function (v) { alpha = v; });
  bindSlider('thr', 'thrVal', function (v) { return v.toFixed(0); }, function (v) { sliceThr = v; });
  bindSlider('spawn', 'spawnVal', function (v) { return v.toFixed(1); }, function (v) { spawnRate = v; });
  bindSlider('grav', 'gravVal', function (v) { return v.toFixed(0); }, function (v) { grav = v; });
  bindSlider('frad', 'fradVal', function (v) { return v.toFixed(0); }, function (v) { fruitR = v; });
  bindSlider('sweep', 'sweepVal', function (v) { return v.toFixed(0); }, function (v) { sweepDeg = v; if (autoGainEl) updateGainUI(); });
  bindSlider('relGain', 'relGainVal', function (v) { return v.toFixed(1); }, function (v) { relGain = v; });
  bindSlider('dead', 'deadVal', function (v) { return v.toFixed(1); }, function (v) { relDeadzone = v; });
  bindSlider('pull', 'pullVal', function (v) { return v.toFixed(1); }, function (v) { centerPull = v; });

  // AUTO GAIN: gain = W / sweep (px per derajat), isotropik X=Y. Di relative, ukuran
  // layar cuma mempengaruhi RASA (px/°), bukan KEBENARAN mapping -> boleh otomatis.
  var autoGainEl = document.getElementById('autoGain');
  function relGainEff() { return autoGainEl.checked ? W / Math.max(sweepDeg, 1) : relGain; }
  function updateGainUI() {
    var el = document.getElementById('relGain');
    el.disabled = autoGainEl.checked;
    document.getElementById('relGainVal').textContent =
      autoGainEl.checked ? relGainEff().toFixed(1) : relGain.toFixed(1);
  }
  autoGainEl.addEventListener('change', function () { updateGainUI(); saveRel(); });
  function setSweep(v) {
    var el = document.getElementById('sweep');
    el.value = v;
    el.dispatchEvent(new Event('input'));
    saveRel();
  }
  document.getElementById('sw35').addEventListener('click', function () { setSweep(35); });
  document.getElementById('sw45').addEventListener('click', function () { setSweep(45); });
  document.getElementById('sw60').addEventListener('click', function () { setSweep(60); });
  ['sweep', 'relGain', 'dead', 'pull'].forEach(function (id) {
    document.getElementById(id).addEventListener('change', function () { saveRel(); });
  });

  var invX = 1, invY = 1;
  document.getElementById('invX').addEventListener('change', function () { invX = this.checked ? -1 : 1; });
  document.getElementById('invY').addEventListener('change', function () { invY = this.checked ? -1 : 1; });
  var gameEl = document.getElementById('game');

  // --- quaternion & vector math ---
  var R2D = 180 / Math.PI;
  // rotasi vektor [0,1,0] (sumbu +Y device = ujung pointer) oleh quaternion ABSOLUT q
  // -> forward vector di frame DUNIA (W3C: X timur, Y utara, Z atas)
  function rotateDeviceY(q) {
    return [
      2 * (q.x * q.y - q.w * q.z),
      q.w * q.w - q.x * q.x + q.y * q.y - q.z * q.z,
      2 * (q.y * q.z + q.w * q.x)
    ];
  }
  function cross(a, b) {
    return [a[1] * b[2] - a[2] * b[1], a[2] * b[0] - a[0] * b[2], a[0] * b[1] - a[1] * b[0]];
  }
  function dot(a, b) { return a[0] * b[0] + a[1] * b[1] + a[2] * b[2]; }
  function vnorm(a) { return Math.sqrt(dot(a, a)); }
  function normalize(a) {
    var n = vnorm(a);
    return n < 1e-12 ? null : [a[0] / n, a[1] / n, a[2] / n];
  }
  function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

  // --- basis acuan ROLL-INVARIANT dari world-up ---
  // INVARIANT: roll device di sumbu pointing TIDAK BOLEH ngaruh ke posisi pointer.
  // Basis dibangun dari arah acuan f + world-up, BUKAN dari sumbu device.
  var WORLD_UP = [0, 0, 1];
  function basisFrom(f) {           // f = unit forward acuan
    var c = cross(WORLD_UP, f);
    var cn = vnorm(c);
    if (cn < 0.1) return null;      // nunjuk langit/lantai — degenerate
    var r = [c[0] / cn, c[1] / cn, c[2] / cn];  // sumbu kanan layar
    var u = cross(f, r);                         // sumbu atas layar
    return { f: f, r: r, u: u };
  }

  // --- homography: fit 4 titik (u,w) -> pojok layar NORMALIZED (0..1) ---
  function gaussSolve(A, b) {
    var n = A.length, i, j, k, M = [];
    for (i = 0; i < n; i++) M.push(A[i].concat([b[i]]));
    for (k = 0; k < n; k++) {
      var piv = k;
      for (i = k + 1; i < n; i++) if (Math.abs(M[i][k]) > Math.abs(M[piv][k])) piv = i;
      if (Math.abs(M[piv][k]) < 1e-12) return null;
      var tmp = M[k]; M[k] = M[piv]; M[piv] = tmp;
      for (i = k + 1; i < n; i++) {
        var f = M[i][k] / M[k][k];
        for (j = k; j <= n; j++) M[i][j] -= f * M[k][j];
      }
    }
    var x = new Array(n);
    for (i = n - 1; i >= 0; i--) {
      var s = M[i][n];
      for (j = i + 1; j < n; j++) s -= M[i][j] * x[j];
      x[i] = s / M[i][i];
    }
    return x;
  }

  function fitHomography(src, dst) { // src: [{u,w}]x4, dst: [{x,y}]x4
    var A = [], b = [], i;
    for (i = 0; i < 4; i++) {
      var u = src[i].u, w = src[i].w, x = dst[i].x, y = dst[i].y;
      A.push([u, w, 1, 0, 0, 0, -x * u, -x * w]); b.push(x);
      A.push([0, 0, 0, u, w, 1, -y * u, -y * w]); b.push(y);
    }
    var h = gaussSolve(A, b);
    if (!h) return null;
    return [h[0], h[1], h[2], h[3], h[4], h[5], h[6], h[7], 1];
  }

  function applyH(Hm, u, w) {
    var d = Hm[6] * u + Hm[7] * w + Hm[8];
    if (Math.abs(d) < 1e-12) return null;
    return {
      x: (Hm[0] * u + Hm[1] * w + Hm[2]) / d,
      y: (Hm[3] * u + Hm[4] * w + Hm[5]) / d
    };
  }

  // --- jarak titik ke SEGMEN (proyeksi ter-clamp). Anti-tunneling slice. ---
  function distPointSeg(px, py, ax, ay, bx, by) {
    var dx = bx - ax, dy = by - ay;
    var len2 = dx * dx + dy * dy;
    var t = len2 > 0 ? ((px - ax) * dx + (py - ay) * dy) / len2 : 0;
    t = clamp(t, 0, 1);
    var cx = ax + t * dx, cy = ay + t * dy;
    return Math.sqrt((px - cx) * (px - cx) + (py - cy) * (py - cy));
  }

  // --- kalibrasi state ---
  var CORNERS_N = [{ x: 0, y: 0 }, { x: 1, y: 0 }, { x: 1, y: 1 }, { x: 0, y: 1 }];
  var CORNER_NAMES = ['KIRI ATAS', 'KANAN ATAS', 'KANAN BAWAH', 'KIRI BAWAH'];
  var LS_KEY = 'tiltNinjaCalib';
  var CALIB_VER = 2;               // skema v2: basis world-up. Format lama JANGAN di-load.
  var Hmat = null;
  var calBasis = null;             // {f,r,u} dari fit
  var mode = 'placeholder';
  var calibStep = -1;              // -1 = tidak kalibrasi; 0..3 = pojok ke-n
  var calibVs = [];                // forward vector per pojok yang sudah di-capture
  var calibMsg = '';
  var flashCorner = -1, flashUntil = 0;
  var seenCapIds = {};             // dedupe capture by id
  var DF_MIN = 0.15;               // tolak kalau dot(v,f) < ini

  var mapPlaceholder = document.getElementById('mapPlaceholder');
  var mapCalibrated = document.getElementById('mapCalibrated');
  var mapRelative = document.getElementById('mapRelative');
  var verifyEl = document.getElementById('verify');
  var verifyLbl = document.getElementById('verifyLbl');
  var calibrateBtn = document.getElementById('calibrate');
  var redoBtn = document.getElementById('redoCorner');
  var clearCalibBtn = document.getElementById('clearCalib');
  var recenterBtn = document.getElementById('recenter');

  function setMode(m) {
    if (m === 'calibrated' && !Hmat) m = 'placeholder';
    mode = m;
    mapPlaceholder.checked = (m === 'placeholder');
    mapCalibrated.checked = (m === 'calibrated');
    mapRelative.checked = (m === 'relative');
    relPrevYaw = null;              // reset delta state — jangan lompat pas masuk relative
    sx = -1; sy = -1;
    updateModeUI();
  }
  function updateModeUI() {
    mapCalibrated.disabled = !Hmat;
    redoBtn.style.display = (calibStep >= 0) ? 'block' : 'none';
    calibrateBtn.textContent = (calibStep >= 0) ? 'CANCEL CALIB' : 'CALIBRATE';
    var rel = (mode === 'relative');
    calibrateBtn.style.display = rel ? 'none' : 'block';
    clearCalibBtn.style.display = rel ? 'none' : 'block';
    verifyLbl.style.display = rel ? 'none' : 'flex';
    // tombol tetap tampil di semua mode; di relative dia teleport ke tengah
    recenterBtn.textContent = rel ? 'RECENTER (R) — ke tengah' : 'RECENTER (R) — placeholder';
  }
  mapPlaceholder.addEventListener('change', function () { if (this.checked) { setMode('placeholder'); saveRel(); } });
  mapCalibrated.addEventListener('change', function () { if (this.checked) { setMode('calibrated'); saveRel(); } });
  mapRelative.addEventListener('change', function () { if (this.checked) { setMode('relative'); saveRel(); } });

  // cycle mode tanpa balik ke laptop: keyboard M / tombol MODE di controller
  var modeFlashName = '', modeFlashUntil = 0;
  function cycleMode() {
    var order = ['placeholder', 'calibrated', 'relative'];
    var next = order[(order.indexOf(mode) + 1) % 3];
    if (next === 'calibrated' && !Hmat) next = 'relative';
    setMode(next);
    saveRel();
    modeFlashName = mode.toUpperCase();
    modeFlashUntil = performance.now() + 1000;
  }
  function handleModeBtn(id) {
    if (calibStep >= 0) return;               // abaikan saat flow kalibrasi
    if (id !== undefined) {
      if (seenCapIds[id]) return;
      seenCapIds[id] = true;
    }
    cycleMode();
  }

  function saveRel() {
    try {
      localStorage.setItem(REL_KEY, JSON.stringify({
        mode: mode, autoGain: autoGainEl.checked,
        sweep: sweepDeg, relGain: relGain, dead: relDeadzone, pull: centerPull
      }));
    } catch (e) {}
  }

  function saveCalib() {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        ver: CALIB_VER, H: Hmat,
        f: calBasis.f, r: calBasis.r, u: calBasis.u,
        ts: Date.now()
      }));
    } catch (e) {}
  }
  function loadCalib() {
    try {
      var d = JSON.parse(localStorage.getItem(LS_KEY));
      // format lama (tanpa ver / ver beda) = frame acuan ikut roll — INVALID, paksa re-calibrate
      if (d && d.ver === CALIB_VER && d.H && d.H.length === 9 &&
          d.f && d.f.length === 3 && d.r && d.r.length === 3 && d.u && d.u.length === 3) {
        Hmat = d.H;
        calBasis = { f: d.f, r: d.r, u: d.u };
        setMode('calibrated');
      }
    } catch (e) {}
    updateModeUI();
  }

  calibrateBtn.addEventListener('click', function () {
    if (calibStep >= 0) {          // sedang kalibrasi -> batal
      calibStep = -1;
      calibVs = [];
      calibMsg = '';
    } else {
      calibVs = [];
      calibMsg = '';
      calibStep = 0;
    }
    updateModeUI();
  });

  redoBtn.addEventListener('click', function () {
    if (calibStep >= 0 && calibVs.length > 0) {
      calibVs.pop();
      calibStep = calibVs.length;
      calibMsg = '';
    }
  });

  document.getElementById('clearCalib').addEventListener('click', function () {
    Hmat = null;
    calBasis = null;
    try { localStorage.removeItem(LS_KEY); } catch (e) {}
    setMode('placeholder');
    updateModeUI();
  });

  function finishFit() {
    calibStep = -1;
    var f = normalize([
      calibVs[0][0] + calibVs[1][0] + calibVs[2][0] + calibVs[3][0],
      calibVs[0][1] + calibVs[1][1] + calibVs[2][1] + calibVs[3][1],
      calibVs[0][2] + calibVs[1][2] + calibVs[2][2] + calibVs[3][2]
    ]);
    var B = f ? basisFrom(f) : null;
    if (!B) {
      calibMsg = 'Fit GAGAL: arah rata-rata terlalu vertikal — ulangi kalibrasi, arahkan lebih horizontal.';
      updateModeUI();
      return;
    }
    var src = [], i;
    for (i = 0; i < 4; i++) {
      var df = dot(calibVs[i], B.f);
      if (df < DF_MIN) {
        calibMsg = 'Fit GAGAL: pojok ' + CORNER_NAMES[i] + ' terlalu menyamping — ulangi kalibrasi.';
        updateModeUI();
        return;
      }
      src.push({ u: dot(calibVs[i], B.r) / df, w: dot(calibVs[i], B.u) / df });
    }
    var fit = fitHomography(src, CORNERS_N);
    if (!fit) {
      calibMsg = 'Fit homography GAGAL (titik degenerate) — ulangi kalibrasi.';
      updateModeUI();
      return;
    }
    Hmat = fit;
    calBasis = B;
    saveCalib();
    calibMsg = '';
    setMode('calibrated');
    updateModeUI();
  }

  function handleCapture(qa, id) {
    if (calibStep < 0) return;                 // tolak di luar mode kalibrasi
    if (id !== undefined) {                    // dedupe: id yang sudah diproses diabaikan
      if (seenCapIds[id]) return;
      seenCapIds[id] = true;
    }
    if (!qa || qa.length !== 4) return;
    var v = rotateDeviceY({ w: qa[0], x: qa[1], y: qa[2], z: qa[3] });
    if (vnorm(cross(WORLD_UP, v)) < 0.1) {
      calibMsg = 'Capture DITOLAK — arahkan lebih horizontal, ulangi pojok ini.';
      return;
    }
    calibMsg = '';
    flashCorner = calibStep;
    flashUntil = performance.now() + 450;
    calibVs.push(v);
    if (calibVs.length === 4) finishFit();
    else { calibStep = calibVs.length; updateModeUI(); }
  }

  // --- state dari stream ---
  var lastQ = null;                 // quaternion mentah terakhir dari controller
  var plcBasis = null;              // basis placeholder — di-set saat RECENTER / paket pertama
  var sx = -1, sy = -1;             // posisi pointer ter-smooth (EMA)
  var lastU = 0, lastW = 0;         // readout debug

  // --- kecepatan pointer + peak (dari posisi ter-smooth yang dirender) ---
  var prevSx = -1, prevSy = -1;
  var speed = 0, peak = 0, peakT = 0;
  var PEAK_HOLD_MS = 1500;
  // dt untuk SPEED = selisih timestamp PENGIRIM (jam HP, monotonic) — bukan waktu
  // nyampe. Jitter jaringan ±7ms di atas interval ~29ms bikin speed meleset
  // -20%..+45%; selisih jam yang sama menghilangkan itu total.
  var lastSendTs = -1, pktSx = -1, pktSy = -1;
  var lastDtSend = -1, lastDtRecv = -1;

  // --- mode RELATIVE (gyro-mouse): integrasi delta yaw/pitch. Nol posisi, nol
  // kalibrasi -> kebal user pindah tempat. Tetap dari forward vector world Z-up
  // yang roll-invariant (jalur sensor yang sama, bukan jalur baru). ---
  var relX = -1, relY = -1;
  var relPrevYaw = null, relPrevPitch = 0;
  var lastDYaw = 0, lastDPitch = 0, lastAngRate = 0;
  function wrapPI(a) {
    while (a > Math.PI) a -= 2 * Math.PI;
    while (a < -Math.PI) a += 2 * Math.PI;
    return a;
  }
  function updateRelative(dts) {
    if (relX < 0) { relX = W / 2; relY = H / 2; }
    var v = rotateDeviceY(lastQ);
    var vz = clamp(v[2], -1, 1);
    var pitch = Math.asin(vz);
    var yawOk = Math.abs(vz) <= 0.98;   // hampir tegak -> yaw tak terdefinisi -> skip dYaw
    var yaw = yawOk ? Math.atan2(v[1], v[0]) : null;
    if (dts <= 0 || dts > 0.2) {        // gap/reconnect/reload -> reset prev, jangan lompat
      relPrevYaw = yaw;
      relPrevPitch = pitch;
      return;
    }
    var dYaw = (relPrevYaw !== null && yawOk) ? wrapPI(yaw - relPrevYaw) : 0;
    var dPitch = pitch - relPrevPitch;
    relPrevYaw = yaw;
    relPrevPitch = pitch;
    var rate = Math.sqrt(dYaw * dYaw + dPitch * dPitch) * R2D / dts;
    lastDYaw = dYaw * R2D; lastDPitch = dPitch * R2D; lastAngRate = rate;
    if (rate < relDeadzone) return;     // deadzone laju sudut: nahan drift ngesot
    var g = relGainEff();
    // yaw atan2 naik berlawanan jarum jam -> tanda default dibalik biar kanan = kanan
    relX = clamp(relX - dYaw * R2D * g * invX, 0, W);
    relY = clamp(relY - dPitch * R2D * g * invY, 0, H);
  }
  document.getElementById('resetPeak').addEventListener('click', function () {
    peak = 0;
    peakT = performance.now();
  });

  // --- game state (Stage 3a) ---
  var score = 0, missCount = 0;
  var fruits = [], parts = [], trail = [];
  var spawnAcc = 0;
  var FRUIT_COLORS = ['#e43', '#3c5', '#fa0', '#3af', '#e5e', '#fe3'];
  var GRAY_FLASH_MS = 220;

  function spawnFruit() {
    var r = fruitR;
    var x = W * (0.15 + 0.7 * Math.random());
    var y = H + r;
    // puncak parabola di paruh atas layar: tinggi naik = (H+r) - apexY
    var apexY = H * (0.10 + 0.35 * Math.random());
    var vy = -Math.sqrt(2 * grav * (y - apexY));
    var vx = (Math.random() * 2 - 1) * W * 0.12;
    fruits.push({
      x: x, y: y, vx: vx, vy: vy, r: r,
      color: FRUIT_COLORS[(Math.random() * FRUIT_COLORS.length) | 0],
      grayUntil: 0
    });
  }

  function burstFruit(f) {
    var i, a, sp;
    for (i = 0; i < 8; i++) {
      a = Math.random() * Math.PI * 2;
      sp = 300 + Math.random() * 500;
      parts.push({
        x: f.x, y: f.y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        ang: a, len: 10 + Math.random() * 15,
        life: 0.4, t: 0, color: f.color
      });
    }
  }

  // update + deteksi slice per frame. Segmen = posisi ter-smooth frame lalu -> sekarang
  // (yang dilihat = yang motong). Titik doang bakal tunneling di 34Hz.
  function updateGame(dt, segAx, segAy, segBx, segBy, segValid, now) {
    spawnAcc += spawnRate * dt;
    while (spawnAcc >= 1) { spawnAcc -= 1; spawnFruit(); }

    var i, f;
    for (i = fruits.length - 1; i >= 0; i--) {
      f = fruits[i];
      f.vy += grav * dt;
      f.x += f.vx * dt;
      f.y += f.vy * dt;

      if (f.y - f.r > H && f.vy > 0) {         // lolos ke bawah tanpa dipotong
        fruits.splice(i, 1);
        missCount++;
        continue;
      }

      if (segValid && distPointSeg(f.x, f.y, segAx, segAy, segBx, segBy) <= f.r) {
        if (speed >= sliceThr) {
          burstFruit(f);
          fruits.splice(i, 1);
          score++;
        } else if (now >= f.grayUntil) {
          // kena TAPI kurang cepat -> flash abu-abu. Bedain "deteksi rusak" vs "kurang cepat".
          f.grayUntil = now + GRAY_FLASH_MS;
        }
      }
    }

    for (i = parts.length - 1; i >= 0; i--) {
      var p = parts[i];
      p.t += dt;
      if (p.t >= p.life) { parts.splice(i, 1); continue; }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += grav * 0.5 * dt;
    }
  }

  function drawGame(now) {
    var i, f;
    for (i = 0; i < fruits.length; i++) {
      f = fruits[i];
      ctx.fillStyle = now < f.grayUntil ? '#888' : f.color;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.fill();
    }
    for (i = 0; i < parts.length; i++) {
      var p = parts[i];
      ctx.globalAlpha = 1 - p.t / p.life;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + Math.cos(p.ang) * p.len, p.y + Math.sin(p.ang) * p.len);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawTrail() {
    var i;
    for (i = 1; i < trail.length; i++) {
      ctx.globalAlpha = i / trail.length;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1 + 3 * (i / trail.length);
      ctx.beginPath();
      ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
      ctx.lineTo(trail[i].x, trail[i].y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    ctx.fillStyle = '#fff';
    ctx.font = '20px ui-monospace, monospace';
    ctx.textAlign = 'right';
    ctx.fillText('SKOR ' + score + '   MISS ' + missCount + '   BUAH ' + fruits.length, W - 16, 30);
    ctx.textAlign = 'start';
  }

  // --- statistik jaringan ---
  var wsState = 'idle';
  var msgCount = 0, msgHz = 0, msgHzT0 = 0;
  var lastSeq = -1, dropped = 0;
  var lastArrive = 0, dtEma = -1, jitter = 0;

  var ws = null;
  function connect() {
    if (ws) {                       // jaga SATU socket — socket ganda = capture dobel
      ws.onclose = null;
      try { ws.close(); } catch (e) {}
      ws = null;
    }
    var base = document.getElementById('relayUrl').value.trim().replace(/\/+$/, '');
    base = base.replace(/^http/, 'ws'); // https -> wss
    var room = document.getElementById('room').value.trim() || '1234';
    wsState = 'connecting';
    ws = new WebSocket(base + '/ws?room=' + encodeURIComponent(room) + '&role=display');
    ws.onopen = function () {
      wsState = 'open';
      overlay.style.display = 'none';
      controls.classList.add('on');
    };
    ws.onclose = function () {
      wsState = 'closed';
      overlay.style.display = 'flex';
    };
    ws.onmessage = function (ev) {
      var m;
      try { m = JSON.parse(ev.data); } catch (e) { return; }
      if (!m) return;

      if (m.btn === 'capture') { handleCapture(m.q, m.id); return; }
      if (m.btn === 'mode') { handleModeBtn(m.id); return; }
      if (m.t === undefined || !m.q) return;

      // echo DULUAN, sebelum proses apa pun — RTT ngukur jaringan, bukan render
      try { ws.send(JSON.stringify({ ack: m.t, ts: m.ts })); } catch (e) {}

      var now = performance.now();
      if (lastArrive > 0) {
        var dt = now - lastArrive;      // waktu nyampe: HANYA buat statistik jaringan
        lastDtRecv = dt;
        dtEma = dtEma < 0 ? dt : dtEma + 0.1 * (dt - dtEma);
        jitter += 0.1 * (Math.abs(dt - dtEma) - jitter);
      }
      lastArrive = now;

      msgCount++;
      if (msgHzT0 === 0) msgHzT0 = now;
      if (now - msgHzT0 >= 1000) {
        msgHz = Math.round(msgCount * 1000 / (now - msgHzT0));
        msgCount = 0;
        msgHzT0 = now;
      }

      if (lastSeq >= 0 && m.t > lastSeq + 1) dropped += m.t - lastSeq - 1;
      lastSeq = m.t;

      lastQ = { w: m.q[0], x: m.q[1], y: m.q[2], z: m.q[3] };
      // basis awal placeholder dari paket pertama. Di relative JANGAN dipanggil:
      // recenter di sana = teleport ke tengah (bakal ke-reset tiap paket karena
      // plcBasis tetap null); relX/relY sudah init sendiri di updateRelative().
      if (!plcBasis && mode !== 'relative') recenter();

      // SPEED dari timestamp pengirim. Guard:
      //   dts <= 0   -> out-of-order / controller reload (ts reset) -> skip, resync
      //   dts > 0.2s -> gap/drop/reconnect -> skip, resync (jangan speed ngawur)
      if (typeof m.ts === 'number') {
        var dts = lastSendTs >= 0 ? (m.ts - lastSendTs) / 1000 : -1;
        if (lastSendTs >= 0) lastDtSend = m.ts - lastSendTs;
        if (dts > 0 && dts <= 0.2 && pktSx >= 0 && sx >= 0) {
          var sdx = sx - pktSx, sdy = sy - pktSy;
          speed = Math.sqrt(sdx * sdx + sdy * sdy) / dts;
        }
        if (mode === 'relative') updateRelative(dts);
        lastSendTs = m.ts;
        pktSx = sx; pktSy = sy;
      }
    };
  }
  document.getElementById('connectBtn').addEventListener('click', connect);

  function recenter() { // mode-aware. relative = teleport ke tengah; lainnya = reset basis placeholder
    if (mode === 'relative') {
      // padanan "angkat mouse, taruh di tengah meja": relative mengakumulasi
      // offset -> pointer bisa nyangkut di pojok. plcBasis TIDAK disentuh.
      relX = W / 2; relY = H / 2;
      relPrevYaw = null;            // reset delta state — jangan lompat
      sx = -1; sy = -1;             // EMA mulai fresh dari tengah, bukan nyeret dari posisi lama
      return;
    }
    if (!lastQ) return;
    var v = rotateDeviceY(lastQ);
    var B = basisFrom(v);
    if (!B) {
      calibMsg = 'RECENTER ditolak — arahkan lebih horizontal.';
      return;
    }
    plcBasis = B;
    sx = W / 2;
    sy = H / 2;
  }
  recenterBtn.addEventListener('click', recenter);
  window.addEventListener('keydown', function (e) {
    if (e.key === 'r' || e.key === 'R') recenter();
    if ((e.key === 'm' || e.key === 'M') && calibStep < 0) cycleMode();
  });

  function drawCalibTarget() {
    var i, c, cx, cy;
    // pojok yang sudah ke-capture = hijau
    for (i = 0; i < calibVs.length; i++) {
      c = CORNERS_N[i];
      ctx.fillStyle = '#0f0';
      ctx.beginPath();
      ctx.arc(c.x * W, c.y * H, 14, 0, Math.PI * 2);
      ctx.fill();
    }
    // flash singkat di pojok yang baru di-capture — feedback tanpa liat pointer
    var now = performance.now();
    if (flashCorner >= 0 && now < flashUntil) {
      c = CORNERS_N[flashCorner];
      ctx.fillStyle = 'rgba(0,255,0,' + (0.6 * (flashUntil - now) / 450).toFixed(3) + ')';
      ctx.beginPath();
      ctx.arc(c.x * W, c.y * H, 120, 0, Math.PI * 2);
      ctx.fill();
    }
    // target aktif = putih
    c = CORNERS_N[calibStep];
    cx = c.x * W; cy = c.y * H;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, 60, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - 90, cy); ctx.lineTo(cx + 90, cy);
    ctx.moveTo(cx, cy - 90); ctx.lineTo(cx, cy + 90);
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = '28px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('KALIBRASI ' + (calibVs.length + 1) + '/4 — pojok ' + CORNER_NAMES[calibStep], W / 2, H / 2 - 20);
    ctx.font = '18px ui-monospace, monospace';
    ctx.fillStyle = '#999';
    ctx.fillText('Arahkan pedang ke target, tekan CAPTURE di HP', W / 2, H / 2 + 20);
    if (calibMsg) {
      ctx.fillStyle = '#f88';
      ctx.fillText(calibMsg, W / 2, H / 2 + 56);
    }
    ctx.textAlign = 'start';
  }

  // --- render loop ---
  var lastFrameT = 0;
  function draw() {
    requestAnimationFrame(draw);
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, W, H);

    var now = performance.now();
    var dt = lastFrameT > 0 ? Math.min((now - lastFrameT) / 1000, 0.05) : 0;
    lastFrameT = now;

    if (mode === 'relative') {
      bannerEl.textContent = 'RELATIVE — nol kalibrasi, bebas posisi';
    } else {
      bannerEl.textContent = 'MAPPING PLACEHOLDER — belum terkalibrasi. Jalankan CALIBRATE untuk mapping homography.';
    }
    bannerEl.style.display = (mode !== 'calibrated' && calibStep < 0 && wsState === 'open') ? 'block' : 'none';

    if (calibStep >= 0) {
      drawCalibTarget();            // pointer sengaja disembunyikan; game dibekukan
    } else {
      // --- posisi pointer ---
      var tx = null, ty = null;
      if (lastQ) {
        var v = rotateDeviceY(lastQ);
        if (mode === 'calibrated' && Hmat && calBasis) {
          // frame acuan = basis world-up dari 4 pojok. TANPA recenter. Roll-invariant.
          var df = dot(v, calBasis.f);
          if (df >= DF_MIN) {
            lastU = dot(v, calBasis.r) / df;
            lastW = dot(v, calBasis.u) / df;
            var p = applyH(Hmat, lastU, lastW);
            if (p) {
              tx = clamp(p.x * W, 0, W);
              ty = clamp(p.y * H, 0, H);
            }
          }
        } else if (mode === 'relative') {
          // posisi diintegrasi per paket di updateRelative(); di sini cuma center pull
          if (relX >= 0) {
            if (centerPull > 0 && dt > 0) {
              relX += (W / 2 - relX) * centerPull * dt;
              relY += (H / 2 - relY) * centerPull * dt;
            }
            tx = relX; ty = relY;
          }
        } else if (plcBasis) {
          // MAPPING PLACEHOLDER — yaw/pitch linear di basis world-up (roll-invariant)
          var fd = dot(v, plcBasis.f), rd = dot(v, plcBasis.r), ud = dot(v, plcBasis.u);
          var yaw = Math.atan2(rd, fd);
          var pitch = Math.atan2(ud, Math.sqrt(rd * rd + fd * fd));
          tx = clamp(W / 2 + yaw * R2D * sensX * invX, 0, W);
          ty = clamp(H / 2 - pitch * R2D * sensY * invY, 0, H);
        }
      }

      // --- EMA + segmen kecepatan (dari posisi yang DIRENDER) ---
      var segValid = false, segAx = 0, segAy = 0;
      if (tx !== null) {
        if (sx < 0) { sx = tx; sy = ty; }
        segAx = sx; segAy = sy;
        segValid = prevSx >= 0;
        sx += alpha * (tx - sx);   // EMA tetap, di posisi akhir
        sy += alpha * (ty - sy);
        // speed di-update per paket dari timestamp pengirim (lihat onmessage);
        // deteksi hit tetap pakai segmen posisi ter-smooth. Di sini cuma peak-hold.
        if (speed >= peak || now - peakT > PEAK_HOLD_MS) {
          peak = speed;
          peakT = now;
        }
        prevSx = sx; prevSy = sy;

        trail.push({ x: sx, y: sy });
        if (trail.length > 10) trail.shift();
      } else {
        prevSx = -1; prevSy = -1;
        trail.length = 0;
      }

      // --- game ---
      if (gameEl.checked) {
        updateGame(dt, segAx, segAy, sx, sy, segValid && tx !== null, now);
        drawGame(now);
        drawTrail();
      }

      // --- pointer crosshair + dot (di atas buah) ---
      if (tx !== null) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(sx - 24, sy); ctx.lineTo(sx + 24, sy);
        ctx.moveTo(sx, sy - 24); ctx.lineTo(sx, sy + 24);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(sx, sy, 7, 0, Math.PI * 2);
        ctx.fillStyle = '#0f0';
        ctx.fill();
      }

      if (gameEl.checked) drawHUD();
    }

    // nama mode aktif sesaat pas ganti (M / tombol MODE di controller)
    if (modeFlashUntil > performance.now()) {
      ctx.fillStyle = '#fff';
      ctx.font = '48px ui-monospace, monospace';
      ctx.textAlign = 'center';
      ctx.fillText(modeFlashName, W / 2, H / 2);
      ctx.textAlign = 'start';
    }

    // verify tepi: sapu pointer sepanjang tepi — nempel = fit bener (bukan buat relative)
    if (verifyEl.checked && mode !== 'relative') {
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 2;
      ctx.strokeRect(1, 1, W - 2, H - 2);
      ctx.beginPath();
      ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, 12);
      ctx.moveTo(W / 2, H); ctx.lineTo(W / 2, H - 12);
      ctx.moveTo(0, H / 2); ctx.lineTo(12, H / 2);
      ctx.moveTo(W, H / 2); ctx.lineTo(W - 12, H / 2);
      ctx.stroke();
    }

    var age = lastArrive > 0 ? (performance.now() - lastArrive) : -1;
    debugEl.textContent =
      'conn    ' + wsState + '\n' +
      'msg     ' + msgHz + ' Hz\n' +
      'jitter  ' + jitter.toFixed(1) + ' ms\n' +
      'drop    ' + dropped + ' pkt\n' +
      'age     ' + (age < 0 ? '—' : age.toFixed(0) + ' ms') + '\n' +
      'mode    ' + mode + (Hmat ? '' : ' (belum ada kalibrasi)') + '\n' +
      'uw      ' + lastU.toFixed(4) + '  ' + lastW.toFixed(4) + '\n' +
      'pos     x ' + (sx < 0 ? '—' : sx.toFixed(0)) + '  y ' + (sy < 0 ? '—' : sy.toFixed(0)) + '\n' +
      'spd     ' + speed.toFixed(0) + ' px/s  peak ' + peak.toFixed(0) + '  thr ' + sliceThr.toFixed(0) + '\n' +
      'dt      send ' + (lastDtSend < 0 ? '—' : lastDtSend.toFixed(1)) + '  recv ' + (lastDtRecv < 0 ? '—' : lastDtRecv.toFixed(1)) + ' (ms)' +
      (mode === 'relative' ? '\nrel     dYaw ' + lastDYaw.toFixed(2) + '  dPitch ' + lastDPitch.toFixed(2) +
        '  rate ' + lastAngRate.toFixed(1) + ' °/s  gain ' + relGainEff().toFixed(1) + ' px/°' : '') +
      (calibStep < 0 && calibMsg ? '\nnote    ' + calibMsg : '');
  }

  loadCalib();                     // kalibrasi tersimpan tetap dimuat — dipakai kalau user pindah ke calibrated
  if (relSaved && (relSaved.mode === 'relative' || relSaved.mode === 'placeholder' || relSaved.mode === 'calibrated')) {
    setMode(relSaved.mode);        // preferensi user tersimpan -> hormati (setMode jaga fallback)
  } else {
    // DEFAULT = RELATIVE (hardware-verified). Menimpa auto-switch loadCalib ke
    // calibrated; kalibrasinya sendiri TIDAK dihapus.
    setMode('relative');
  }
  updateGainUI();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
