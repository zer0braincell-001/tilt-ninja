<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tilt-ninja — display (Stage 2a)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #111;
    color: #eee;
    font-family: ui-monospace, monospace;
    -webkit-user-select: none; user-select: none;
  }
  #stage { position: fixed; inset: 0; display: block; }

  #banner {
    position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
    background: #320; color: #fc8;
    border: 1px solid #a70;
    padding: 6px 12px;
    font-size: 12px;
    z-index: 15;
    pointer-events: none;
    white-space: nowrap;
  }

  #debug {
    position: fixed; top: 8px; left: 8px;
    font-size: 12px;
    line-height: 1.6;
    color: #9c9;
    background: rgba(0,0,0,0.55);
    padding: 6px 8px;
    z-index: 10;
    pointer-events: none;
    white-space: pre;
  }

  #overlay {
    position: fixed; inset: 0;
    background: #111;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    z-index: 20;
  }
  #overlay .box { display: flex; gap: 10px; align-items: center; }
  #overlay label { font-size: 14px; color: #ccc; }
  #overlay input {
    font: inherit; font-size: 18px;
    padding: 10px 12px;
    background: #000; color: #fff;
    border: 1px solid #666;
    width: 420px; max-width: 70vw;
  }
  #overlay #room { width: 120px; }
  #connectBtn {
    font: inherit; font-size: 18px;
    padding: 10px 24px;
    background: #222; color: #fff;
    border: 2px solid #666;
    cursor: pointer;
  }
  #connectBtn:active { background: #333; }
  #overlay .hint { color: #999; font-size: 12px; }

  #controls {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.65);
    padding: 10px 14px 14px;
    z-index: 10;
    display: none;
  }
  #controls.on { display: block; }
  .row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .row label { width: 92px; font-size: 12px; color: #ccc; flex: none; }
  .row input[type=range] { flex: 1; height: 22px; }
  .row label.cb { width: auto; display: flex; align-items: center; gap: 6px; margin-right: 18px; }
  .row .val { width: 46px; text-align: right; font-size: 12px; color: #9c9; flex: none; }
  #recenter {
    font: inherit; font-size: 14px;
    padding: 8px 0;
    width: 100%;
    background: #222; color: #fff;
    border: 1px solid #666;
    cursor: pointer;
  }
  #recenter:active { background: #333; }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div id="banner">MAPPING PLACEHOLDER — Stage 2a menilai LAG, bukan akurasi. Homography = Stage 2b.</div>

<div id="debug">waiting…</div>

<div id="controls">
  <button id="recenter">RECENTER (R)</button>
  <div class="row">
    <label for="sensX">sensX (px/°)</label>
    <input id="sensX" type="range" min="1" max="30" step="0.5" value="12">
    <span class="val" id="sensXVal">12.0</span>
  </div>
  <div class="row">
    <label for="sensY">sensY (px/°)</label>
    <input id="sensY" type="range" min="1" max="30" step="0.5" value="12">
    <span class="val" id="sensYVal">12.0</span>
  </div>
  <div class="row">
    <label for="alpha">smooth α</label>
    <input id="alpha" type="range" min="0.05" max="1" step="0.05" value="0.3">
    <span class="val" id="alphaVal">0.30</span>
  </div>
  <div class="row">
    <label>invert</label>
    <label class="cb"><input id="invX" type="checkbox"> X</label>
    <label class="cb"><input id="invY" type="checkbox"> Y</label>
  </div>
</div>

<div id="overlay">
  <div class="box">
    <label for="relayUrl">relay</label>
    <input id="relayUrl" type="text" value="https://tilt-ninja-relay.well65632.workers.dev">
  </div>
  <div class="box">
    <label for="room">room</label>
    <input id="room" type="text" value="1234">
    <button id="connectBtn">CONNECT</button>
  </div>
  <div class="hint">Buka controller di HP, samakan room code, lalu CONNECT dua-duanya. R = recenter.</div>
</div>

<script>
(function () {
  'use strict';

  var canvas = document.getElementById('stage');
  var ctx = canvas.getContext('2d');
  var debugEl = document.getElementById('debug');
  var overlay = document.getElementById('overlay');
  var controls = document.getElementById('controls');

  var W = 0, H = 0, dpr = 1;
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // --- tuning ---
  var sensX = 12, sensY = 12, alpha = 0.3;
  function bindSlider(id, valId, fmt, set) {
    var el = document.getElementById(id);
    var valEl = document.getElementById(valId);
    function apply() {
      var v = parseFloat(el.value);
      set(v);
      valEl.textContent = fmt(v);
    }
    el.addEventListener('input', apply);
    apply();
  }
  bindSlider('sensX', 'sensXVal', function (v) { return v.toFixed(1); }, function (v) { sensX = v; });
  bindSlider('sensY', 'sensYVal', function (v) { return v.toFixed(1); }, function (v) { sensY = v; });
  bindSlider('alpha', 'alphaVal', function (v) { return v.toFixed(2); }, function (v) { alpha = v; });
  var invX = 1, invY = 1;
  document.getElementById('invX').addEventListener('change', function () { invX = this.checked ? -1 : 1; });
  document.getElementById('invY').addEventListener('change', function () { invY = this.checked ? -1 : 1; });

  // --- quaternion math (identik dengan controller) ---
  var R2D = 180 / Math.PI;
  function quatConj(q) { return { w: q.w, x: -q.x, y: -q.y, z: -q.z }; }
  function quatMul(a, b) {
    return {
      w: a.w * b.w - a.x * b.x - a.y * b.y - a.z * b.z,
      x: a.w * b.x + a.x * b.w + a.y * b.z - a.z * b.y,
      y: a.w * b.y - a.x * b.z + a.y * b.w + a.z * b.x,
      z: a.w * b.z + a.x * b.y - a.y * b.x + a.z * b.w
    };
  }
  // rotasi vektor [0,1,0] (sumbu +Y device = ujung pointer) oleh q
  function rotateDeviceY(q) {
    return {
      x: 2 * (q.x * q.y - q.w * q.z),
      y: q.w * q.w - q.x * q.x + q.y * q.y - q.z * q.z,
      z: 2 * (q.y * q.z + q.w * q.x)
    };
  }
  function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

  // --- state dari stream ---
  var lastQ = null;                 // quaternion mentah terakhir dari controller
  var q0 = null;                    // origin (semua kalibrasi di display, bukan di HP)
  var sx = -1, sy = -1;             // posisi pointer ter-smooth (EMA)

  // --- statistik jaringan ---
  var wsState = 'idle';
  var msgCount = 0, msgHz = 0, msgHzT0 = 0;
  var lastSeq = -1, dropped = 0;
  var lastArrive = 0, dtEma = -1, jitter = 0;

  var ws = null;
  function connect() {
    var base = document.getElementById('relayUrl').value.trim().replace(/\/+$/, '');
    base = base.replace(/^http/, 'ws'); // https -> wss
    var room = document.getElementById('room').value.trim() || '1234';
    wsState = 'connecting';
    ws = new WebSocket(base + '/ws?room=' + encodeURIComponent(room) + '&role=display');
    ws.onopen = function () {
      wsState = 'open';
      overlay.style.display = 'none';
      controls.classList.add('on');
    };
    ws.onclose = function () {
      wsState = 'closed';
      overlay.style.display = 'flex';
    };
    ws.onmessage = function (ev) {
      var m;
      try { m = JSON.parse(ev.data); } catch (e) { return; }
      if (!m || m.t === undefined || !m.q) return;

      // echo DULUAN, sebelum render/apapun — RTT ngukur jaringan, bukan render
      try { ws.send(JSON.stringify({ ack: m.t, ts: m.ts })); } catch (e) {}

      var now = performance.now();
      if (lastArrive > 0) {
        var dt = now - lastArrive;
        dtEma = dtEma < 0 ? dt : dtEma + 0.1 * (dt - dtEma);
        jitter += 0.1 * (Math.abs(dt - dtEma) - jitter);
      }
      lastArrive = now;

      msgCount++;
      if (msgHzT0 === 0) msgHzT0 = now;
      if (now - msgHzT0 >= 1000) {
        msgHz = Math.round(msgCount * 1000 / (now - msgHzT0));
        msgCount = 0;
        msgHzT0 = now;
      }

      if (lastSeq >= 0 && m.t > lastSeq + 1) dropped += m.t - lastSeq - 1;
      lastSeq = m.t;

      lastQ = { w: m.q[0], x: m.q[1], y: m.q[2], z: m.q[3] };
      if (!q0) q0 = lastQ;
    };
  }
  document.getElementById('connectBtn').addEventListener('click', connect);

  function recenter() {
    if (lastQ) {
      q0 = lastQ;
      sx = W / 2;
      sy = H / 2;
    }
  }
  document.getElementById('recenter').addEventListener('click', recenter);
  window.addEventListener('keydown', function (e) {
    if (e.key === 'r' || e.key === 'R') recenter();
  });

  // --- render loop ---
  function draw() {
    requestAnimationFrame(draw);
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, W, H);

    var yaw = 0, pitch = 0;
    if (lastQ && q0) {
      var qRel = quatMul(quatConj(q0), lastQ);
      var v = rotateDeviceY(qRel);
      yaw = Math.atan2(v.x, v.y);
      pitch = Math.atan2(v.z, Math.sqrt(v.x * v.x + v.y * v.y));

      // MAPPING PLACEHOLDER (Stage 2a) — diganti homography 4-corner di Stage 2b
      var tx = clamp(W / 2 + yaw * R2D * sensX * invX, 0, W);
      var ty = clamp(H / 2 + pitch * R2D * sensY * invY, 0, H);
      if (sx < 0) { sx = tx; sy = ty; }
      sx += alpha * (tx - sx);
      sy += alpha * (ty - sy);

      // center marker
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(W / 2 - 10, H / 2); ctx.lineTo(W / 2 + 10, H / 2);
      ctx.moveTo(W / 2, H / 2 - 10); ctx.lineTo(W / 2, H / 2 + 10);
      ctx.stroke();

      // blade crosshair + dot
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx - 24, sy); ctx.lineTo(sx + 24, sy);
      ctx.moveTo(sx, sy - 24); ctx.lineTo(sx, sy + 24);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(sx, sy, 7, 0, Math.PI * 2);
      ctx.fillStyle = '#0f0';
      ctx.fill();
    }

    var age = lastArrive > 0 ? (performance.now() - lastArrive) : -1;
    debugEl.textContent =
      'conn    ' + wsState + '\n' +
      'msg     ' + msgHz + ' Hz\n' +
      'jitter  ' + jitter.toFixed(1) + ' ms\n' +
      'drop    ' + dropped + ' pkt\n' +
      'age     ' + (age < 0 ? '—' : age.toFixed(0) + ' ms') + '\n' +
      'aim     yaw ' + (yaw * R2D).toFixed(1) + '  pitch ' + (pitch * R2D).toFixed(1) + ' (deg)';
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
